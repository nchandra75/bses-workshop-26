<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="Inter, system-ui, sans-serif">
  <rect x="2" y="2" width="516" height="376" rx="14" fill="#fafafa" stroke="#cbd5e1" stroke-width="2"/>
