<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Inter, system-ui, sans-serif">
  <rect x="2" y="2" width="756" height="316" rx="14" fill="#fafafa" stroke="#cbd5e1" stroke-width="2"/>
  <text x="380" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">Pipelined: registers cut the path into 4 short stages</text>

  <!-- reg S1 reg S2 reg S3 reg S4 reg -->
  <!-- reg 1 -->
  <rect x="24" y="74" width="26" height="58" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="37" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">reg</text>
  <line x1="50" y1="103" x2="62" y2="103" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- S1 -->
  <rect x="62" y="74" width="116" height="58" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">S1</text>
  <text x="120" y="116" text-anchor="middle" font-size="10" fill="#1e3a8a">9 multiplies</text>
  <line x1="178" y1="103" x2="190" y2="103" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- reg 2 -->
  <rect x="190" y="74" width="26" height="58" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="203" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">reg</text>
  <line x1="216" y1="103" x2="228" y2="103" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- S2 -->
  <rect x="228" y="74" width="116" height="58" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="286" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">S2</text>
  <text x="286" y="116" text-anchor="middle" font-size="10" fill="#1e3a8a">adder tree</text>
  <line x1="344" y1="103" x2="356" y2="103" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- reg 3 -->
  <rect x="356" y="74" width="26" height="58" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="369" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">reg</text>
  <line x1="382" y1="103" x2="394" y2="103" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- S3 -->
  <rect x="394" y="74" width="116" height="58" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="452" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">S3</text>
  <text x="452" y="116" text-anchor="middle" font-size="10" fill="#1e3a8a">shift, abs</text>
  <line x1="510" y1="103" x2="522" y2="103" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- reg 4 -->
  <rect x="522" y="74" width="26" height="58" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="535" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">reg</text>
  <line x1="548" y1="103" x2="560" y2="103" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- S4 -->
  <rect x="560" y="74" width="116" height="58" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="618" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">S4</text>
  <text x="618" y="116" text-anchor="middle" font-size="10" fill="#1e3a8a">clamp</text>
  <line x1="676" y1="103" x2="688" y2="103" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- reg 5 -->
  <rect x="688" y="74" width="26" height="58" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="701" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">reg</text>

  <!-- per-stage timing ticks: every stage comfortably under the 10 ns budget -->
  <text x="120" y="158" text-anchor="middle" font-size="10" fill="#475569">~5 ns</text>
  <text x="286" y="158" text-anchor="middle" font-size="10" fill="#475569">~6 ns</text>
  <text x="452" y="158" text-anchor="middle" font-size="10" fill="#475569">~5 ns</text>
  <text x="618" y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">~6.7 ns</text>

  <!-- 10 ns budget reference bar -->
  <rect x="62" y="178" width="652" height="16" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="388" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">each stage fits inside the 10 ns clock budget (100 MHz)</text>

  <!-- note on the trade -->
  <text x="380" y="222" text-anchor="middle" font-size="11" fill="#475569">throughput unchanged: still 1 pixel / cycle &#183; cost: latency +4 cycles</text>

  <!-- verdict banner -->
  <rect x="140" y="240" width="480" height="52" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="380" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Longest stage ~6.7 ns &lt; 10 ns budget</text>
  <text x="380" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">WNS +3.3 ns &#183; timing MET &#183; runs at 100 MHz</text>

  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
