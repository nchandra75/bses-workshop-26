<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="aGry" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#5b6b7d"/>
    </marker>
    <marker id="aWrm" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#c2683f"/>
    </marker>
    <marker id="aGrn" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#4f9b72"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="628" height="458" rx="16" fill="#fafafa" stroke="#cbd5e1" stroke-width="2"/>
  <text x="320" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#34465f">3&#215;3 sliding window fed by 2 line buffers</text>

  <!-- ===== recycle wires (warm): pushed off the left, held one row, back in at the right ===== -->
  <!-- line buffer 1 input: from bottom-row left exit, around the bottom, into LB1 on the right -->
  <polyline points="80,282 30,282 30,254 612,254 612,198 588,198" fill="none" stroke="#c2683f" stroke-width="2.5" marker-end="url(#aWrm)"/>
  <!-- line buffer 2 input: from middle-row left exit, around the top, into LB2 on the right -->
  <polyline points="80,198 30,198 30,148 612,148 612,94 588,94" fill="none" stroke="#c2683f" stroke-width="2.5" marker-end="url(#aWrm)"/>

  <!-- ===== 3x3 register window ===== -->
  <!-- top row -->
  <rect x="80"  y="58" width="72" height="72" rx="8" fill="#dbe7f5" stroke="#6f93c0" stroke-width="2"/>
  <rect x="168" y="58" width="72" height="72" rx="8" fill="#dbe7f5" stroke="#6f93c0" stroke-width="2"/>
  <rect x="256" y="58" width="72" height="72" rx="8" fill="#dbe7f5" stroke="#6f93c0" stroke-width="2"/>
  <!-- middle row (centre tap highlighted) -->
  <rect x="80"  y="162" width="72" height="72" rx="8" fill="#dbe7f5" stroke="#6f93c0" stroke-width="2"/>
  <rect x="168" y="162" width="72" height="72" rx="8" fill="#cfe6d8" stroke="#4f9b72" stroke-width="2.5"/>
  <rect x="256" y="162" width="72" height="72" rx="8" fill="#dbe7f5" stroke="#6f93c0" stroke-width="2"/>
  <!-- bottom row -->
  <rect x="80"  y="266" width="72" height="72" rx="8" fill="#dbe7f5" stroke="#6f93c0" stroke-width="2"/>
  <rect x="168" y="266" width="72" height="72" rx="8" fill="#dbe7f5" stroke="#6f93c0" stroke-width="2"/>
  <rect x="256" y="266" width="72" height="72" rx="8" fill="#dbe7f5" stroke="#6f93c0" stroke-width="2"/>
  <text x="204" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="#1f6b41">centre</text>

  <!-- shift-left chevrons inside each row -->
  <g stroke="#5b6b7d" stroke-width="2" marker-end="url(#aGry)">
    <line x1="166" y1="94" x2="154" y2="94"/>
    <line x1="254" y1="94" x2="242" y2="94"/>
    <line x1="166" y1="198" x2="154" y2="198"/>
    <line x1="254" y1="198" x2="242" y2="198"/>
    <line x1="166" y1="302" x2="154" y2="302"/>
    <line x1="254" y1="302" x2="242" y2="302"/>
  </g>

  <!-- ===== line buffers on the right ===== -->
  <!-- LB2 feeds the TOP row -->
  <rect x="384" y="72" width="204" height="44" rx="10" fill="#e6dcf2" stroke="#9b82c9" stroke-width="2"/>
  <line x1="414" y1="72" x2="414" y2="116" stroke="#c3b4e0" stroke-width="1"/>
  <line x1="440" y1="72" x2="440" y2="116" stroke="#c3b4e0" stroke-width="1"/>
  <text x="500" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#5b4a86">line buffer 2</text>
  <text x="500" y="107" text-anchor="middle" font-size="11" fill="#5b4a86">one row delay  &#183;  &#183;  &#183;</text>
  <!-- LB1 feeds the MIDDLE row -->
  <rect x="384" y="176" width="204" height="44" rx="10" fill="#e6dcf2" stroke="#9b82c9" stroke-width="2"/>
  <line x1="414" y1="176" x2="414" y2="220" stroke="#c3b4e0" stroke-width="1"/>
  <line x1="440" y1="176" x2="440" y2="220" stroke="#c3b4e0" stroke-width="1"/>
  <text x="500" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#5b4a86">line buffer 1</text>
  <text x="500" y="211" text-anchor="middle" font-size="11" fill="#5b4a86">one row delay  &#183;  &#183;  &#183;</text>

  <!-- line-buffer outputs into the right end of the top two rows (warm) -->
  <line x1="384" y1="94" x2="332" y2="94" stroke="#c2683f" stroke-width="2.5" marker-end="url(#aWrm)"/>
  <line x1="384" y1="198" x2="332" y2="198" stroke="#c2683f" stroke-width="2.5" marker-end="url(#aWrm)"/>

  <!-- ===== new pixel in (green), bottom-right ===== -->
  <line x1="476" y1="302" x2="332" y2="302" stroke="#4f9b72" stroke-width="3" marker-end="url(#aGrn)"/>
  <text x="484" y="298" font-size="13" font-weight="700" fill="#1f6b41">new pixel in</text>
  <text x="484" y="314" font-size="11" fill="#1f6b41">(raster order)</text>

  <!-- ===== caption ===== -->
  <text x="320" y="378" text-anchor="middle" font-size="13" fill="#5b6b7d">Each pixel streams in once at the bottom-right and shifts left along its row.</text>
  <text x="320" y="398" text-anchor="middle" font-size="13" fill="#5b6b7d">The pixel falling off a row's left end is held one full row in a line buffer,</text>
  <text x="320" y="418" text-anchor="middle" font-size="13" fill="#5b6b7d">then re-enters the row above at the right &#8212; all 9 neighbours, every cycle.</text>
</svg>
