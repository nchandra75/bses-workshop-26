<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 1050" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="aRed" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#c2683f"/>
    </marker>
    <marker id="aGrn" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#4f9b72"/>
    </marker>
    <marker id="aGry" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#5b6b7d"/>
    </marker>
  </defs>

  <!-- =================== PANEL A : NAIVE =================== -->
  <rect x="6" y="10" width="448" height="500" rx="16" fill="#fafafa" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="46" text-anchor="middle" font-size="20" font-weight="700" fill="#9a4a16">Naive 2-D convolution</text>
  <text x="230" y="72" text-anchor="middle" font-size="14" fill="#5b6b7d">the window slides, so memory is read again and again</text>

  <!-- image grid 6x6, cell 40, origin (110,92) -->
  <rect x="110" y="92" width="240" height="240" fill="#eef2f7" stroke="#c2cdda" stroke-width="1.5"/>
  <!-- grid lines -->
  <g stroke="#c2cdda" stroke-width="1">
    <line x1="150" y1="92" x2="150" y2="332"/>
    <line x1="190" y1="92" x2="190" y2="332"/>
    <line x1="230" y1="92" x2="230" y2="332"/>
    <line x1="270" y1="92" x2="270" y2="332"/>
    <line x1="310" y1="92" x2="310" y2="332"/>
    <line x1="110" y1="132" x2="350" y2="132"/>
    <line x1="110" y1="172" x2="350" y2="172"/>
    <line x1="110" y1="212" x2="350" y2="212"/>
    <line x1="110" y1="252" x2="350" y2="252"/>
    <line x1="110" y1="292" x2="350" y2="292"/>
  </g>
  <text x="356" y="106" font-size="13" fill="#7a8a9d">image</text>

  <!-- window 1 : cols 0-2, rows 0-2 -->
  <rect x="110" y="92" width="120" height="120" fill="#f4cdb6" fill-opacity="0.6" stroke="#d98b5f" stroke-width="3"/>
  <!-- window 2 : cols 1-3, rows 0-2 (shifted right by one) -->
  <rect x="150" y="92" width="120" height="120" fill="#bcd3ec" fill-opacity="0.55" stroke="#5f8fc8" stroke-width="3"/>
  <text x="128" y="86" font-size="13" font-weight="700" fill="#b15a2a">step 1</text>
  <text x="246" y="86" font-size="13" font-weight="700" fill="#3f6ea3">step 2</text>

  <!-- the re-read band (overlap) -->
  <text x="230" y="362" text-anchor="middle" font-size="13" fill="#9a4a16">6 of these 9 pixels were already fetched a moment ago</text>

  <!-- DRAM block -->
  <rect x="110" y="384" width="240" height="48" rx="8" fill="#dbe4f0" stroke="#8ea4c4" stroke-width="2"/>
  <text x="230" y="414" text-anchor="middle" font-size="15" font-weight="700" fill="#34465f">Main memory (DRAM)</text>

  <!-- repeated-read arrows from DRAM up to the window -->
  <g stroke="#c2683f" stroke-width="2" marker-end="url(#aRed)" fill="none">
    <line x1="140" y1="384" x2="140" y2="216"/>
    <line x1="170" y1="384" x2="170" y2="216"/>
    <line x1="200" y1="384" x2="200" y2="216"/>
    <line x1="230" y1="384" x2="230" y2="216"/>
    <line x1="260" y1="384" x2="260" y2="216"/>
  </g>

  <!-- punchline stat -->
  <rect x="56" y="452" width="348" height="44" rx="10" fill="#fde8d8" stroke="#e0935b" stroke-width="2"/>
  <text x="230" y="480" text-anchor="middle" font-size="16" font-weight="700" fill="#9a4a16">DRAM reads &#8776; 9 &#215; (number of pixels)</text>

  <!-- =================== PANEL B : LINE BUFFER =================== -->
  <rect x="6" y="540" width="448" height="500" rx="16" fill="#fafafa" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="576" text-anchor="middle" font-size="20" font-weight="700" fill="#1f6b41">With a line buffer</text>
  <text x="230" y="602" text-anchor="middle" font-size="14" fill="#5b6b7d">keep the last 3 rows on chip, read each pixel once</text>

  <!-- DRAM block -->
  <rect x="110" y="620" width="240" height="48" rx="8" fill="#dbe4f0" stroke="#8ea4c4" stroke-width="2"/>
  <text x="230" y="650" text-anchor="middle" font-size="15" font-weight="700" fill="#34465f">Main memory (DRAM)</text>

  <!-- single streaming arrow -->
  <line x1="230" y1="668" x2="230" y2="706" stroke="#4f9b72" stroke-width="3" marker-end="url(#aGrn)"/>
  <text x="242" y="692" font-size="13" font-weight="700" fill="#1f6b41">1 pixel / cycle</text>

  <!-- on-chip boundary -->
  <rect x="62" y="716" width="336" height="208" rx="12" fill="#f4f0fb" stroke="#9b82c9" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="230" y="740" text-anchor="middle" font-size="13" font-weight="700" fill="#5b4a86">on-chip memory (BRAM) &#8212; fast, no DRAM traffic</text>

  <!-- 3 line-buffer rows, 6 cells each, cell 34, origin (128,752) -->
  <g>
    <!-- row labels -->
    <text x="120" y="775" text-anchor="end" font-size="12" fill="#5b4a86">row i-1</text>
    <text x="120" y="809" text-anchor="end" font-size="12" fill="#5b4a86">row i</text>
    <text x="120" y="843" text-anchor="end" font-size="12" fill="#5b4a86">row i+1</text>
  </g>
  <!-- three SRAM row strips -->
  <g fill="#e6dcf2" stroke="#9b82c9" stroke-width="1.5">
    <rect x="128" y="758" width="204" height="34"/>
    <rect x="128" y="792" width="204" height="34"/>
    <rect x="128" y="826" width="204" height="34"/>
  </g>
  <!-- cell divisions -->
  <g stroke="#c3b4e0" stroke-width="1">
    <line x1="162" y1="758" x2="162" y2="860"/>
    <line x1="196" y1="758" x2="196" y2="860"/>
    <line x1="230" y1="758" x2="230" y2="860"/>
    <line x1="264" y1="758" x2="264" y2="860"/>
    <line x1="298" y1="758" x2="298" y2="860"/>
    <line x1="128" y1="792" x2="332" y2="792"/>
    <line x1="128" y1="826" x2="332" y2="826"/>
  </g>

  <!-- the 3x3 window tapping the three buffered rows -->
  <rect x="196" y="758" width="102" height="102" fill="#cfe6d8" fill-opacity="0.55" stroke="#4f9b72" stroke-width="3"/>
  <text x="247" y="884" text-anchor="middle" font-size="12" font-weight="700" fill="#1f6b41">3&#215;3 window taps the buffers</text>

  <!-- punchline stat -->
  <rect x="56" y="952" width="348" height="44" rx="10" fill="#d9eede" stroke="#5fae7e" stroke-width="2"/>
  <text x="230" y="980" text-anchor="middle" font-size="16" font-weight="700" fill="#1f6b41">DRAM reads = 1 &#215; (number of pixels)</text>
</svg>
